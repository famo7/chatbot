<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laddar...</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧹</text></svg>">
    <style>
        /* ═══════════════════════════════════════════════
       THEME VARIABLES — dynamically loaded from /config
       ═══════════════════════════════════════════════ */
        :root {
            --brand: #2563eb;
            --brand-dark: #1d4ed8;
            --brand-text: #ffffff;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: 'Geist', sans-serif;
        }

        /* ── Chat window ── */
        #chat-window {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 560px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 9998;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15), 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /* ── Header ── */
        .chat-header {
            background: var(--brand);
            color: var(--brand-text);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: white;
            padding: 2px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .header-info h2 {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #4ade80;
            border-radius: 50%;
        }

        .header-status span {
            font-size: 0.72rem;
            opacity: 0.9;
        }

        /* ── Messages ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 3px;
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 7px;
            animation: fadeUp 0.2s ease;
        }

        .msg-row.user {
            justify-content: flex-end;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .msg-row.user .msg-avatar {
            background: var(--brand);
            order: 2;
        }

        .msg-bubble {
            max-width: 74%;
            padding: 9px 13px;
            border-radius: 16px;
            font-size: 0.875rem;
            line-height: 1.55;
        }

        .msg-row.bot .msg-bubble {
            background: #fff;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        }

        .msg-row.user .msg-bubble {
            background: var(--brand);
            color: var(--brand-text);
            border-bottom-right-radius: 4px;
        }

        /* ── Typing indicator ── */
        .typing-row {
            padding: 0 14px 8px;
            display: flex;
            align-items: flex-end;
            gap: 7px;
        }

        #typingIndicator {
            padding: 9px 13px;
            background: #fff;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
            display: none;
            gap: 4px;
            align-items: center;
        }

        #typingIndicator.active {
            display: flex;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.18s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.36s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-5px);
            }
        }

        /* ── Input bar ── */
        .chat-input-bar {
            padding: 12px 14px;
            background: #fff;
            border-top: 1px solid #f1f5f9;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 9px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 999px;
            font-family: inherit;
            font-size: 0.875rem;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
            background: #f8fafc;
        }

        .chat-input:focus {
            border-color: var(--brand);
            background: #fff;
        }

        .chat-input::placeholder {
            color: #94a3b8;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            border: none;
            background: var(--brand);
            color: var(--brand-text);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--brand-dark);
            transform: scale(1.06);
        }

        .send-btn:active {
            transform: scale(0.94);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .chat-footer {
            text-align: center;
            padding: 6px;
            font-size: 0.68rem;
            color: #cbd5e1;
            background: #fff;
            letter-spacing: 0.02em;
        }

        @media (max-width: 480px) {
            #chat-window {
                width: 100vw;
                height: 100vh;
                right: 0;
                bottom: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Chat window -->
    <div id="chat-window" role="dialog" aria-label="Kundtjänst chatt">
        <div class="chat-header">
            <div class="header-avatar" id="headerAvatar"><img data-src="logo"
                    style="width:38px;height:38px;border-radius:50%;object-fit:cover;" alt=""
                    onerror="this.style.display='none'; this.parentElement.textContent = (window.companyConfig && window.companyConfig.avatar_emoji) || '🤖';">
            </div>
            <div class="header-info">
                <h2 id="companyName">Laddar...</h2>
                <div class="header-status">
                    <div class="status-dot"></div>
                    <span>Svarar direkt — dygnet runt</span>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="msg-row bot">
                <div class="msg-avatar" id="welcomeAvatar"><img data-src="logo"
                        style="width:28px;height:28px;border-radius:50%;object-fit:cover;" alt=""
                        onerror="this.style.display='none'; this.parentElement.textContent = (window.companyConfig && window.companyConfig.avatar_emoji) || '🤖';">
                </div>
                <div class="msg-bubble" id="welcomeMessage">Laddar...</div>
            </div>
        </div>

        <div class="typing-row">
            <div class="msg-avatar" style="background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.1);">🤖</div>
            <div id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="chat-input-bar">
            <input type="text" id="chatInput" class="chat-input" placeholder="Skriv ett meddelande..." />
            <button id="sendBtn" class="send-btn" aria-label="Skicka">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>
        </div>

        <div class="chat-footer">Powered by Orbixa</div>
    </div>

    <script>
        const API_URL = '';
        let companyConfig = {};

        // Load company configuration on page load
        async function loadConfig() {
            try {
                const response = await fetch(`${API_URL}/config`);
                companyConfig = await response.json();

                // Apply configuration
                window.companyConfig = companyConfig;
                document.title = `${companyConfig.company_name} — Chatt`;
                document.getElementById('companyName').textContent = companyConfig.company_name;
                document.getElementById('welcomeMessage').textContent = companyConfig.welcome_message;

                // Update logo URLs
                const logoUrl = window.location.origin + '/logo';
                document.querySelector('#headerAvatar img').src = logoUrl;
                document.querySelector('#welcomeAvatar img').src = logoUrl;

                // Update colors
                document.documentElement.style.setProperty('--brand', companyConfig.colors.primary);
                document.documentElement.style.setProperty('--brand-dark', companyConfig.colors.primary_dark);
            } catch (err) {
                console.error('Failed to load config:', err);
            }
        }

        // Load config immediately
        loadConfig();

        const chatWindow = document.getElementById('chat-window');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        let history = [];

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addMessage(text, isUser = false) {
            const row = document.createElement('div');
            row.className = `msg-row ${isUser ? 'user' : 'bot'}`;
            row.innerHTML = isUser
                ? `<div class="msg-bubble">${escapeHtml(text)}</div><div class="msg-avatar"></div>`
                : `<div class="msg-avatar"><img src="${window.location.origin + '/logo'}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;" alt="" onerror="this.style.display='none'; this.parentElement.textContent = (window.companyConfig && window.companyConfig.avatar_emoji) || '🤖';"></div><div class="msg-bubble">${escapeHtml(text)}</div>`;
            chatMessages.appendChild(row);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            addMessage(message, true);
            chatInput.value = '';
            sendBtn.disabled = true;
            typingIndicator.classList.add('active');
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, history }),
                });
                const data = await res.json();
                typingIndicator.classList.remove('active');
                history.push({ role: 'user', content: message });
                history.push({ role: 'assistant', content: data.response });
                setTimeout(() => addMessage(data.response), 300);
            } catch (err) {
                typingIndicator.classList.remove('active');
                addMessage('Något gick fel. Försök igen senare.');
            } finally {
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }
    </script>

</body>

</html>
