<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:image" content="https://aloitus.se/static/logo.jpg"/>
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:image" content="https://aloitus.se/static/logo.jpg"/>
    <title>Laddar...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="icon" href="/static/favicons/favicon.ico"/>
    <link rel="icon" href="/static/favicons/favicon-32x32.png" sizes="32x32" type="image/png"/>
    <link rel="icon" href="/static/favicons/favicon-16x16.png" sizes="16x16" type="image/png"/>
    <link rel="apple-touch-icon" href="/static/favicons/apple-touch-icon.png"/>
    <style>
        :root {
            --brand: #2563eb;
            --brand-dark: #1d4ed8;
            --brand-text: #ffffff;
        }

        body {
            font-family: 'Geist', sans-serif;
        }

        /* Runtime-colored elements */
        .chat-header {
            background: var(--brand);
            color: var(--brand-text);
        }

        #chat-toggle {
            background: var(--brand);
        }

        #chat-toggle:hover {
            background: var(--brand-dark);
        }

        .send-btn {
            background: var(--brand);
            color: var(--brand-text);
        }

        .send-btn:hover {
            background: var(--brand-dark);
        }

        .chat-input:focus {
            border-color: var(--brand);
            background: #fff;
        }

        /* Toggle icon animation */
        #chat-toggle svg {
            transition: transform 0.3s ease, opacity 0.2s ease;
        }

        #chat-toggle .icon-close {
            position: absolute;
            opacity: 0;
            transform: rotate(-90deg) scale(0.7);
        }

        #chat-toggle.open .icon-chat {
            opacity: 0;
            transform: rotate(90deg) scale(0.7);
        }

        #chat-toggle.open .icon-close {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        /* Online dot */
        #chat-toggle::after {
            content: '';
            position: absolute;
            top: 4px;
            right: 4px;
            width: 12px;
            height: 12px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid #fff;
            transition: opacity 0.2s;
        }

        #chat-toggle.open::after,
        #chat-toggle.seen::after {
            opacity: 0;
        }

        /* Chat window open/close transition */
        #chat-window {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        #chat-window.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        /* Message animation */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg-row {
            animation: fadeUp 0.2s ease;
        }

        /* Typing dots */
        @keyframes bounce2 {

            0%,
            60%,
            100% {
                transform: translateY(0)
            }

            30% {
                transform: translateY(-5px)
            }
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce2 1.2s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.18s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.36s;
        }

        .chat-messages::-webkit-scrollbar {
            width: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <!-- Toggle button -->
    <button id="chat-toggle" aria-label="Öppna chatt"
        class="fixed bottom-7 right-7 w-[60px] h-[60px] rounded-full border-none cursor-pointer flex items-center justify-center shadow-[0_4px_20px_rgba(0,0,0,0.18)] z-[9999] hover:scale-[1.08] active:scale-[0.96] transition-transform max-sm:right-4 max-sm:bottom-4">
        <svg class="icon-chat" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
        <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
            stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
    </button>

    <!-- Chat window -->
    <div id="chat-window" role="dialog" aria-label="Kundtjänst chatt"
        class="fixed bottom-[104px] right-7 w-[380px] h-[560px] bg-white rounded-[20px] shadow-[0_8px_40px_rgba(0,0,0,0.14),0_2px_8px_rgba(0,0,0,0.08)] flex flex-col overflow-hidden z-[9998] opacity-0 translate-y-4 scale-[0.97] pointer-events-none max-sm:w-[calc(100vw-24px)] max-sm:right-3 max-sm:bottom-24 max-sm:h-[70vh]">

        <!-- Header -->
        <div class="chat-header flex items-center gap-3 px-[18px] py-4 flex-shrink-0">
            <div class="w-[38px] h-[38px] rounded-full bg-white/20 flex items-center justify-center text-xl flex-shrink-0 overflow-hidden"
                id="headerAvatar">
                <img src="/logo" style="width:38px;height:38px;border-radius:50%;object-fit:cover;" alt="Logo"
                    onerror="this.style.display='none'">
            </div>
            <div>
                <h2 id="companyName" class="text-[0.95rem] font-semibold tracking-[-0.01em]">Laddar...</h2>
                <div class="flex items-center gap-1.5 mt-0.5">
                    <div class="w-[7px] h-[7px] bg-[#4ade80] rounded-full"></div>
                    <span class="text-[0.72rem] opacity-90">Svarar direkt — dygnet runt</span>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div id="chatMessages"
            class="chat-messages flex-1 overflow-y-auto px-3.5 py-4 bg-[#f8fafc] flex flex-col gap-2.5 scroll-smooth">
            <div class="msg-row flex items-end gap-1.5">
                <div class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 bg-white shadow-[0_1px_4px_rgba(0,0,0,0.1)] overflow-hidden"
                    id="welcomeAvatar">
                    <img src="/logo" style="width:28px;height:28px;border-radius:50%;object-fit:cover;" alt="Logo"
                        onerror="this.style.display='none'">
                </div>
                <div id="welcomeMessage"
                    class="max-w-[74%] px-3 py-2 rounded-2xl rounded-bl-[4px] text-[0.875rem] leading-[1.55] bg-white text-[#1e293b] shadow-[0_1px_4px_rgba(0,0,0,0.07)]">
                    Laddar...</div>
            </div>
        </div>

        <!-- Typing indicator -->
        <div class="flex items-end gap-1.5 px-3.5 pb-2">
            <div
                class="w-7 h-7 rounded-full bg-white flex items-center justify-center shadow-[0_1px_4px_rgba(0,0,0,0.1)] text-sm flex-shrink-0">
                🤖</div>
            <div id="typingIndicator"
                class="px-3 py-2 bg-white rounded-2xl rounded-bl-[4px] shadow-[0_1px_4px_rgba(0,0,0,0.07)] gap-1 items-center hidden">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Input -->
        <div class="flex gap-2 items-center px-3.5 py-3 bg-white border-t border-[#f1f5f9] flex-shrink-0">
            <input type="text" id="chatInput"
                class="chat-input flex-1 px-4 py-2 border-[1.5px] border-[#e2e8f0] rounded-full font-[inherit] text-[0.875rem] text-[#1e293b] outline-none transition-colors bg-[#f8fafc] placeholder:text-[#94a3b8]"
                placeholder="Skriv ett meddelande..." />
            <button id="sendBtn"
                class="send-btn w-[38px] h-[38px] border-none rounded-full cursor-pointer flex items-center justify-center transition-all hover:scale-[1.06] active:scale-[0.94] disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>
        </div>

        <div class="text-center py-1.5 text-[0.68rem] text-[#cbd5e1] bg-white tracking-[0.02em]">Powered by Aloitus</div>
    </div>

    <script>
        const API_URL = '';
        let companyConfig = {};

        async function loadConfig() {
            try {
                const r = await fetch(`${API_URL}/config`);
                companyConfig = await r.json();
                document.title = `${companyConfig.company_name} — Chatt`;
                document.getElementById('companyName').textContent = companyConfig.company_name;
                document.getElementById('welcomeMessage').textContent = companyConfig.welcome_message;
                document.documentElement.style.setProperty('--brand', companyConfig.colors.primary);
                document.documentElement.style.setProperty('--brand-dark', companyConfig.colors.primary_dark);
            } catch (e) { console.error(e); }
        }
        loadConfig();

        const toggle = document.getElementById('chat-toggle');
        const chatWindow = document.getElementById('chat-window');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        let history = [], isOpen = false;

        toggle.addEventListener('click', () => {
            isOpen = !isOpen;
            toggle.classList.toggle('open', isOpen);
            toggle.classList.toggle('seen', isOpen);
            chatWindow.classList.toggle('open', isOpen);
            if (isOpen) setTimeout(() => chatInput.focus(), 250);
        });

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function addMessage(text, isUser = false) {
            const row = document.createElement('div');
            row.className = 'msg-row flex items-end gap-1.5' + (isUser ? ' justify-end' : '');
            if (isUser) {
                row.innerHTML = `
          <div class="max-w-[74%] px-3 py-2 rounded-2xl rounded-br-[4px] text-[0.875rem] leading-[1.55]" style="background:var(--brand);color:var(--brand-text)">${escapeHtml(text)}</div>
          <div class="w-7 h-7 rounded-full flex-shrink-0" style="background:var(--brand)"></div>`;
            } else {
                row.innerHTML = `
          <div class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 bg-white shadow-[0_1px_4px_rgba(0,0,0,0.1)] overflow-hidden">
            <img src="/logo" style="width:28px;height:28px;border-radius:50%;object-fit:cover;" alt="" onerror="this.style.display='none'">
          </div>
          <div class="max-w-[74%] px-3 py-2 rounded-2xl rounded-bl-[4px] text-[0.875rem] leading-[1.55] bg-white text-[#1e293b] shadow-[0_1px_4px_rgba(0,0,0,0.07)]">${escapeHtml(text)}</div>`;
            }
            chatMessages.appendChild(row);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            addMessage(message, true);
            chatInput.value = '';
            sendBtn.disabled = true;
            typingIndicator.style.display = 'flex';
            chatMessages.scrollTop = chatMessages.scrollHeight;
            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, history }),
                });
                const data = await res.json();
                typingIndicator.style.display = 'none';
                history.push({ role: 'user', content: message });
                history.push({ role: 'assistant', content: data.response });
                setTimeout(() => addMessage(data.response), 300);
            } catch (e) {
                typingIndicator.style.display = 'none';
                addMessage('Något gick fel. Försök igen senare.');
            } finally {
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }
    </script>
</body>

</html>
